name: Super-Linter

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  super-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Super-Linter
        uses: super-linter/super-linter@v9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          VALIDATE_ALL_CODEBASE: true
          DEFAULT_BRANCH: main

          # Allow warnings/errors without failing CI
          ERROR_ON_LINT_ERRORS: false
          ERROR_ON_LINT_WARNINGS: false

          LOG_LEVEL: WARN

          # Ensure markdown is checked but stable
          VALIDATE_MARKDOWN: true
