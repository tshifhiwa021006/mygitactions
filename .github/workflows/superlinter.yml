name: Super-Linter

on: push

permissions:
  contents: read

jobs:
  super-lint:
    name: Lint code base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Super-Linter (NO FAIL MODE)
        uses: super-linter/super-linter@v8
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Scan everything but never fail
          VALIDATE_ALL_CODEBASE: true
          DEFAULT_BRANCH: main

          # Disable strict failure rules
          ERROR_ON_LINT_WARNINGS: false
          ERROR_ON_MISSING_EXEC_BIT: false

          # Turn off noisy linters (common error sources)
          VALIDATE_MARKDOWN: false
          VALIDATE_YAML: false
          VALIDATE_JSON: false
          VALIDATE_BASH: false
          VALIDATE_JAVASCRIPT_ES: false
          VALIDATE_PYTHON_BLACK: false
